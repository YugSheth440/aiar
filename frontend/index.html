<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florence-2 Emergency HUD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00d4ff;
        }
        .hud {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 15px;
            padding: 15px;
            height: 100vh;
        }
        .main-feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .video-box {
            flex: 1;
            position: relative;
            background: #000;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .bbox {
            position: absolute;
            border: 2px solid #ff3333;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.7);
        }
        .label {
            position: absolute;
            background: #ff3333;
            color: white;
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 3px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .stat {
            background: #1a1f3a;
            border: 2px solid #00d4ff;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }
        .stat-val {
            font-size: 1.5em;
            color: #00ff88;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.8em;
            color: #888;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: #1a1f3a;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .advisor-card {
            background: #1a1f3a;
            border: 2px solid #ff6b6b !important;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3) !important;
            display: none;
        }
        .advisor-card.show {
            display: block;
        }
        .title {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: uppercase;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 8px;
        }
        .advisor-title {
            color: #ff6b6b;
        }
        .threat-box {
            background: #ff3333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
        }
        .threat-warn { background: #ffaa00; color: #000; }
        .threat-safe { background: #33aa33; }
        .actions-list {
            list-style: none;
            margin-top: 8px;
        }
        .action-item {
            background: #2a2f4a;
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #ff6b6b;
            border-radius: 3px;
            font-size: 0.85em;
            line-height: 1.3;
        }
        .priority {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-top: 8px;
        }
        .priority-high { background: #ff3333; }
        .priority-mid { background: #ffaa00; color: #000; }
        .priority-low { background: #33aa33; }
        .log-box {
            background: #000;
            border: 1px solid #00d4ff;
            border-radius: 4px;
            padding: 8px;
            font-size: 0.75em;
            height: 150px;
            overflow-y: auto;
            color: #00ff88;
        }
        .log-line {
            margin: 2px 0;
            white-space: pre-wrap;
        }
        .loading { color: #ffaa00; }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
        }
        button:hover { background: #00ff88; }
    </style>
</head>
<body>
    <div class="hud">
        <!-- Main Content -->
        <div class="main-feed">
            <!-- Video Feed -->
            <div class="video-box" id="videoBox">
                <video id="video" autoplay playsinline muted></video>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">FPS</div>
                    <div class="stat-val" id="fps">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">LATENCY</div>
                    <div class="stat-val" id="latency">0ms</div>
                </div>
                <div class="stat">
                    <div class="stat-label">OBJECTS</div>
                    <div class="stat-val" id="objects">0</div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Emergency Advisor -->
            <div class="card advisor-card" id="advisor">
                <div class="title advisor-title">⚠️ AI EMERGENCY RESPONSE</div>
                <div id="threatBox" class="threat-box"></div>
                <div style="margin-top: 10px;">
                    <strong>Actions:</strong>
                    <ol class="actions-list" id="actions"></ol>
                </div>
                <div id="priorityBox" class="priority"></div>
                <div id="caption" style="font-size: 0.8em; margin-top: 8px; color: #aaa;"></div>
            </div>

            <!-- Log -->
            <div class="card">
                <div class="title">Terminal</div>
                <div class="log-box" id="log">
                    <div class="log-line">[INIT] System ready</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="card">
                <div class="title">Controls</div>
                <button onclick="startStream()" style="width: 100%;">Start Stream</button>
                <button onclick="testAnalysis()" style="width: 100%; margin-top: 5px;">Test Groq</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000";
        let ws = null;
        let frameCount = 0;
        let startTime = 0;

        function log(msg, type = "info") {
            const box = document.getElementById("log");
            const line = document.createElement("div");
            line.className = "log-line";
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            box.appendChild(line);
            box.scrollTop = box.scrollHeight;
        }

        function startWS() {
            if (ws) return;
            log("🔗 Connecting WebSocket...");
            setTimeout(() => {
                ws = new WebSocket("ws://localhost:8000/ws");
                
                ws.onopen = () => {
                    log("✓ WebSocket connected", "success");
                    startTime = Date.now();
                    frameCount = 0;
                };

                ws.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        frameCount++;
                        
                        if (frameCount % 10 === 0) {
                            const fps = Math.round(frameCount / ((Date.now() - startTime) / 1000));
                            document.getElementById("fps").textContent = fps;
                            document.getElementById("latency").textContent = "0ms";
                        }
                        
                        // Handle detections count
                        if (data.detections && data.detections.labels) {
                            document.getElementById("objects").textContent = data.detections.labels.length || 0;
                        } else {
                            document.getElementById("objects").textContent = data.count || 0;
                        }
                        
                        // Draw bounding boxes
                        if (data.detections) {
                            drawBoxes(data.detections);
                        }
                        
                        // Show analysis if available
                        if (data.analysis) {
                            log(`\n[Frame ${data.frame}] Groq analysis available`);
                            showAnalysis(data.analysis);
                        }
                    } catch (err) {
                        log(`⚠ WebSocket message error: ${err.message}`);
                    }
                };

                ws.onerror = (err) => {
                    log("✗ WebSocket error: " + err);
                };
                ws.onclose = () => {
                    log("⊘ WebSocket closed - reconnecting...");
                    ws = null;
                    setTimeout(startWS, 3000);
                };
            }, 500);
        }

        async function startStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                const video = document.getElementById("video");
                video.srcObject = stream;
                log("✓ Camera started", "success");
                
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                
                video.onplay = () => {
                    function send() {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0);
                        
                        canvas.toBlob((blob) => {
                            if (ws && ws.readyState === 1) {
                                const reader = new FileReader();
                                reader.onload = (e) => ws.send(e.target.result);
                                reader.readAsArrayBuffer(blob);
                            }
                        }, "image/jpeg", 0.7);
                        
                        requestAnimationFrame(send);
                    }
                    send();
                };
                
                startWS();
            } catch (e) {
                log(`✗ Camera error: ${e.message}`);
            }
        }

        function drawBoxes(detections) {
            const box = document.getElementById("videoBox");
            box.querySelectorAll(".bbox, .label").forEach(el => el.remove());
            
            if (!detections) {
                return;
            }
            
            // Handle both array and object formats
            let bboxes = [];
            let labels = [];
            
            if (Array.isArray(detections)) {
                // If detections is array of detection objects
                bboxes = detections.map(d => d.bbox || d.bboxes || []);
                labels = detections.map(d => d.label || "");
            } else if (detections.bboxes && detections.labels) {
                // If detections is object with bboxes and labels arrays
                bboxes = detections.bboxes;
                labels = detections.labels;
            }
            
            bboxes.forEach((bbox, i) => {
                if (!bbox || bbox.length < 4) return;
                
                const [x1, y1, x2, y2] = bbox;
                
                const bboxEl = document.createElement("div");
                bboxEl.className = "bbox";
                bboxEl.style.left = x1 + "px";
                bboxEl.style.top = y1 + "px";
                bboxEl.style.width = (x2 - x1) + "px";
                bboxEl.style.height = (y2 - y1) + "px";
                box.appendChild(bboxEl);
                
                if (labels && labels[i]) {
                    const labelEl = document.createElement("div");
                    labelEl.className = "label";
                    labelEl.textContent = labels[i];
                    labelEl.style.left = x1 + "px";
                    labelEl.style.top = (y1 - 22) + "px";
                    box.appendChild(labelEl);
                }
            });
        }

        function showAnalysis(analysis) {
            const advisor = document.getElementById("advisor");
            const threatBox = document.getElementById("threatBox");
            const actionsList = document.getElementById("actions");
            const priorityBox = document.getElementById("priorityBox");
            
            if (!analysis || !analysis.actions) {
                log("⚠ Invalid analysis data received");
                return;
            }
            
            // Log to console
            log("════════════════════════════════════════════");
            log("📊 GROQ RESPONSE RECEIVED");
            log("════════════════════════════════════════════");
            log(`🔴 Threat Level: ${(analysis.threat_level || "UNKNOWN").toUpperCase()}`);
            log(`⚡ Priority: ${(analysis.priority || "UNKNOWN").toUpperCase()}`);
            log("📋 Recommended Actions:");
            (analysis.actions || []).forEach((action, i) => {
                log(`   ${i + 1}. ${action}`);
            });
            log("════════════════════════════════════════════");
            
            // Display in HUD
            threatBox.textContent = `🔴 ${(analysis.threat_level || "UNKNOWN").toUpperCase()}`;
            threatBox.className = "threat-box";
            if (analysis.threat_level === "warning") threatBox.classList.add("threat-warn");
            if (analysis.threat_level === "safe") threatBox.classList.add("threat-safe");
            
            actionsList.innerHTML = (analysis.actions || [])
                .map((a, i) => `<li class="action-item">${i + 1}. ${a}</li>`)
                .join("");
            
            const prClass = "priority-" + (analysis.priority === "high" ? "high" : analysis.priority === "medium" ? "mid" : "low");
            priorityBox.className = `priority ${prClass}`;
            priorityBox.textContent = `Priority: ${(analysis.priority || "UNKNOWN").toUpperCase()}`;
            
            advisor.classList.add("show");
        }

        async function testAnalysis() {
            log("🧪 Testing Groq API...");
            log("📡 Sending request to backend /test-groq endpoint...");
            try {
                const res = await fetch(`${API}/test-groq`);
                const data = await res.json();
                
                if (data.status === "success" && data.result) {
                    log(`✓ Backend responded! Status: ${data.status}`);
                    log(`📸 Test labels: ${data.test_labels.join(", ")}`);
                    log(`📝 Test caption: ${data.test_caption}`);
                    showAnalysis(data.result);
                    log("✓ Analysis displayed in Emergency Advisor panel!", "success");
                } else {
                    log(`✗ Test failed: ${data.message || "No result"}`);
                }
            } catch (e) {
                log(`✗ Connection error: ${e.message}`);
                log(`💡 Make sure backend is running: python main.py`);
            }
        }

        // Auto start
        window.onload = () => {
            log("System ready!");
            log("Click 'Test Groq' first to verify backend");
            log("Then click 'Start Stream' to begin camera feed");
        };
    </script>
</body>
</html>
